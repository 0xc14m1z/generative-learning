\\"middle\\" fill=\\"#ef4444\\">V8 (JavaScript)</text><rect class=\\"box\\" x=\\"175\\" y=\\"10\\" width=\\"150\\" height=\\"120\\" fill=\\"#3b82f6\\" stroke=\\"#3b82f6\\"/><text class=\\"label\\" x=\\"250\\" y=\\"35\\" text-anchor=\\"middle\\" fill=\\"#3b82f6\\">WebKit</text><text class=\\"sub\\" x=\\"250\\" y=\\"55\\" text-anchor=\\"middle\\">Safari (macOS, iOS)</text><text class=\\"sub\\" x=\\"250\\" y=\\"70\\" text-anchor=\\"middle\\">All iOS browsers</text><rect x=\\"195\\" y=\\"82\\" width=\\"110\\" height=\\"36\\" rx=\\"6\\" fill=\\"#3b82f6\\" fill-opacity=\\"0.15\\" stroke=\\"#3b82f6\\" stroke-width=\\"1\\"/><text class=\\"sub\\" x=\\"250\\" y=\\"105\\" text-anchor=\\"middle\\" fill=\\"#3b82f6\\">JSCore (JavaScript)</text><rect class=\\"box\\" x=\\"340\\" y=\\"10\\" width=\\"150\\" height=\\"120\\" fill=\\"#f97316\\" stroke=\\"#f97316\\"/><text class=\\"label\\" x=\\"415\\" y=\\"35\\" text-anchor=\\"middle\\" fill=\\"#f97316\\">Gecko</text><text class=\\"sub\\" x=\\"415\\" y=\\"55\\" text-anchor=\\"middle\\">Firefox</text><text class=\\"sub\\" x=\\"415\\" y=\\"70\\" text-anchor=\\"middle\\">Thunderbird</text><rect x=\\"360\\" y=\\"82\\" width=\\"110\\" height=\\"36\\" rx=\\"6\\" fill=\\"#f97316\\" fill-opacity=\\"0.15\\" stroke=\\"#f97316\\" stroke-width=\\"1\\"/><text class=\\"sub\\" x=\\"415\\" y=\\"105\\" text-anchor=\\"middle\\" fill=\\"#f97316\\">SpiderMonkey (JS)</text><rect class=\\"box\\" x=\\"60\\" y=\\"160\\" width=\\"380\\" height=\\"50\\" fill=\\"#8b5cf6\\" stroke=\\"#8b5cf6\\"/><text class=\\"label\\" x=\\"250\\" y=\\"190\\" text-anchor=\\"middle\\" fill=\\"#8b5cf6\\">Web Standards (W3C / WHATWG / TC39)</text><line x1=\\"85\\" y1=\\"130\\" x2=\\"150\\" y2=\\"160\\" stroke=\\"currentColor\\" stroke-width=\\"1\\" opacity=\\"0.3\\"/><line x1=\\"250\\" y1=\\"130\\" x2=\\"250\\" y2=\\"160\\" stroke=\\"currentColor\\" stroke-width=\\"1\\" opacity=\\"0.3\\"/><line x1=\\"415\\" y1=\\"130\\" x2=\\"350\\" y2=\\"160\\" stroke=\\"currentColor\\" stroke-width=\\"1\\" opacity=\\"0.3\\"/><rect class=\\"box\\" x=\\"100\\" y=\\"230\\" width=\\"300\\" height=\\"40\\" fill=\\"#22c55e\\" stroke=\\"#22c55e\\"/><text class=\\"label\\" x=\\"250\\" y=\\"255\\" text-anchor=\\"middle\\" fill=\\"#22c55e\\">Interop Project (cross-browser compat)</text><line x1=\\"250\\" y1=\\"210\\" x2=\\"250\\" y2=\\"230\\" stroke=\\"currentColor\\" stroke-width=\\"1\\" opacity=\\"0.3\\"/></svg>"}},"concepts":{"blink-engine":{"title":"Blink Rendering Engine","body":"The rendering engine behind Chrome and all Chromium-based browsers. Forked from WebKit in 2013 by Google to enable faster development. Blink powers approximately 65% of global web browsing. Its dominance raises concerns about web monoculture — a single company controlling the engine that most people use to access the web.","context":"Blink's dominance means that Chrome's implementation often becomes the de facto standard, for better or worse.","linkedSectionId":null},"web-standards":{"title":"Web Standards","body":"Formal specifications that define how web technologies should work. HTML and DOM are specified by WHATWG, CSS by the W3C CSS Working Group, and JavaScript by TC39 (ECMAScript). Standards ensure interoperability — code written to the standard should work in any compliant browser. The process involves proposals, drafts, implementation feedback, and formal recommendation.","context":"Standards are what make the web an open platform — they prevent any single company from controlling how websites work.","linkedSectionId":null},"w3c":{"title":"World Wide Web Consortium (W3C)","body":"The main international standards organization for the web, founded by Tim Berners-Lee in 1994. The W3C develops specifications for CSS, ARIA, WebRTC, Web Audio, SVG, and many other web technologies. It operates through Working Groups that include representatives from browser vendors, web developers, and other stakeholders.","context":"The W3C provides the governance structure that keeps the web open and interoperable.","linkedSectionId":null}},"deepDives":[{"id":"dd-browsers-1","title":"Deep Dive: The iOS Browser Engine Restriction","content":"<p>Apple requires all browsers on iOS to use WebKit as their rendering engine. This means Chrome on iOS is essentially a WebKit browser with a Chrome UI — it doesn't use Blink or V8. This policy has significant implications: web features that Chrome supports on Android (like WebGPU, Push API quirks, and certain CSS features) may not work in Chrome on iOS because the underlying engine is WebKit.</p><p>The EU's Digital Markets Act (DMA) challenges this restriction. As of 2024, Apple has begun allowing alternative browser engines in the EU, which could lead to a more competitive browser landscape on iOS. Firefox with Gecko and Chrome with Blink on iOS would give users genuine engine choice for the first time since the App Store launched in 2008.</p>"}],"references":[{"id":1,"text":"StatCounter — \\"Browser Market Share Worldwide\\" (2024)","url":"https://gs.statcounter.com/browser-market-share"},{"id":2,"text":"Mozilla — \\"Platform Tilt\\" (2024)","url":"https://mozilla.github.io/platform-tilt/"}]},{"id":"synthesis","levels":{"1":"<p>Let's trace the complete journey one more time, with everything we've learned. You type <code>https://example.com</code> and press Enter. In the next 1-3 seconds, your browser will orchestrate DNS resolution, TCP connections, TLS encryption, HTTP messaging, server processing, and rendering — all working in concert to turn a URL into a visual, interactive page.</p><p>The <span class=\\"concept-trigger\\" data-concept=\\"end-to-end-latency\\">end-to-end latency</span> of this journey is the sum of all its parts. But it's also more than the sum — because each layer interacts with the others. Caching short-circuits DNS. HTTP/2 multiplexing reduces TCP connections. CDNs eliminate distance. The entire <span class=\\"concept-trigger\\" data-concept=\\"web-stack\\">web stack</span> is a system of systems, and understanding their interplay is what separates good web engineers from great ones.</p>","2":"<h3>The Integrated View</h3><p>Here's a realistic timing breakdown for a first visit to a well-optimized site <a class=\\"citation\\" href=\\"#ref-synthesis-1\\">[1]</a>:</p><ul><li><strong>0-50ms</strong> — DNS lookup (cached at resolver level)</li><li><strong>50-100ms</strong> — TCP + TLS handshake (TLS 1.3, 1 RTT)</li><li><strong>100-200ms</strong> — HTTP request sent, TTFB received</li><li><strong>200-400ms</strong> — HTML parsed, critical CSS and JS loaded</li><li><strong>400-800ms</strong> — First Contentful Paint (LCP candidate renders)</li><li><strong>800-1500ms</strong> — Remaining resources load, page becomes fully interactive</li></ul><p>On repeat visits, caching eliminates most of this: cached DNS (~0ms), reused TCP connection, cached assets → the page loads in under 200ms <a class=\\"citation\\" href=\\"#ref-synthesis-2\\">[2]</a>.</p><p>The key insight: <strong>the web is optimized for repeat visits</strong>. Every layer has caching, and together they can reduce a 1.5-second first load to a 100-millisecond repeat load.</p>","3":"<h3>Optimization Priorities by Layer</h3><table><tr><th>Layer</th><th>#1 Optimization</th><th>Impact</th></tr><tr><td>DNS</td><td>Preconnect to critical origins</td><td>-50ms</td></tr><tr><td>Transport</td><td>HTTP/3 + TLS 1.3</td><td>-100ms first load</td></tr><tr><td>Server</td><td>Edge computing + Redis cache</td><td>-200ms TTFB</td></tr><tr><td>Content</td><td>CDN for all static assets</td><td>-300ms global</td></tr><tr><td>Rendering</td><td>Inline critical CSS, defer JS</td><td>-200ms LCP</td></tr><tr><td>Caching</td><td>Immutable versioned assets</td><td>-90% repeat load</td></tr></table><p>The cumulative effect of applying all these optimizations can transform a 5-second page load into a sub-second one. But the order matters: fix the biggest bottleneck first. Use Lighthouse and WebPageTest to identify where your time is actually going.</p>","4":"<h3>The Future of the Web Platform</h3><p>The web continues to evolve along several fronts simultaneously. HTTP/3 and QUIC are becoming the default transport. WebAssembly brings near-native performance to the browser. WebGPU enables GPU compute for AI inference on-device. The View Transitions API makes single-page-app-like transitions possible in multi-page sites.</p><p>Privacy changes are reshaping the ecosystem: the deprecation of third-party cookies, the rise of Privacy Sandbox APIs, and stricter permissions for device access. Performance budgets and sustainability concerns are emerging as first-class engineering priorities.</p><p>The web's greatest strength remains its universality — a URL works on any device, in any browser, without installation. Understanding how each layer of the stack works, from DNS to pixels, equips you to build experiences that honor this promise while pushing the boundaries of what's possible.</p>"},"visualization":{"type":"pipeline","data":{"stages":[{"label":"DNS","color":"#8b5cf6","active":true},{"label":"TCP+TLS","color":"#06b6d4","active":true},{"label":"HTTP","color":"#a855f7","active":true},{"label":"Server","color":"#14b8a6","active":true},{"label":"Render","color":"#22c55e","active":true},{"label":"Cache","color":"#eab308","active":true}]}},"concepts":{"end-to-end-latency":{"title":"End-to-End Latency","body":"The total time from the user's action (clicking a link) to the visible result (page rendered). It's the sum of all intermediate latencies: DNS, TCP, TLS, HTTP, server processing, and rendering. Optimizing end-to-end latency requires understanding and measuring each component, because the bottleneck shifts depending on the user's network, device, and whether resources are cached.","context":"End-to-end latency is the metric that matters most to users — it's what they feel, regardless of how it's distributed across layers.","linkedSectionId":"overview"},"web-stack":{"title":"The Web Stack","body":"The complete set of technologies that make the web work, from physical network infrastructure through transport protocols (TCP/IP, QUIC), security (TLS), application protocols (HTTP), content formats (HTML, CSS, JS), and rendering engines. Each layer builds on the ones below it, and changes at any layer can affect all layers above.","context":"Thinking in terms of the full stack, not just your application code, is what enables the deepest optimizations.","linkedSectionId":null}},"deepDives":[{"id":"dd-synthesis-1","title":"Deep Dive: The 14KB Rule","content":"<p>TCP slow start means a new connection can only send about 14KB (10 TCP segments) before waiting for acknowledgment. This creates a practical rule: <strong>everything needed for the first render should fit in 14KB compressed</strong>.</p><p>This includes the HTML document, inline critical CSS, and any synchronous JavaScript. If you exceed 14KB, the browser must wait for a second round trip before it has enough data to start rendering. On a 100ms RTT connection, that's an extra 100ms before the user sees anything. This single optimization — keeping the critical path under 14KB — often has more impact than any framework choice, build tool, or infrastructure investment.</p>"}],"references":[{"id":1,"text":"Grigorik — \\"High Performance Browser Networking\\" (O'Reilly, 2013)","url":"https://hpbn.co"},{"id":2,"text":"Google — \\"Why Performance Matters\\" (web.dev, 2024)","url":"https://web.dev/articles/why-speed-matters"}]}]`),CC={sections:EC};function kC(e){const o=hC.safeParse(e);return o.success?o.data:e}function zC(e){const o=vC.safeParse(e);return o.success?o.data:e}function R0(e,o){const r=window[e];return r&&typeof r=="object"?r:o}const NC=R0("__STRUCTURE_DATA__",TC),AC=R0("__CONTENT_DATA__",CC),MC=kC(NC),OC=zC(AC);async function DC(){return null}class H0 extends se.Component{state={error:null};static getDerivedStateFromError(o){return{error:o}}componentDidCatch(o){console.error(`[ErrorBoundary${this.props.la
